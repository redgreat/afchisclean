services:
    afchisclean:
        image: 'registry.cn-hangzhou.aliyuncs.com/redgreat/afchisclean:latest'
        container_name: afchisclean
        hostname: afchisclean
        restart: unless-stopped
        volumes:
            # 仅挂载 config.yml；目录权限由镜像 entrypoint 在启动时 chown/chmod
            - ./conf/config.yml:/app/conf/config.yml
            - ./log/:/app/log
        # 可选：显式指定配置文件（需对 appuser 可读）
        # environment:
        #     CONFIG_PATH: /app/conf/config.yml
        environment:
            DISABLE_IPV6: 'true'
            TZ: 'Asia/Shanghai'
            LANG: 'zh_CN.UTF-8'
        deploy:
            resources:
                limits:
                    memory: 1G
                reservations:
                    memory: 128M
        mem_swappiness: 0
        oom_kill_disable: true
        ulimits:
            nofile:
                soft: 65536
                hard: 65536
